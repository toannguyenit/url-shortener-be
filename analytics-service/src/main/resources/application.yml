server:
  port: 8084

spring:
  application:
    name: analytics-service
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:urlshortener}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        auto-startup: false

geoip:
  database-path: ${GEOIP_DB_PATH:/data/GeoLite2-City.mmdb}

management:
  endpoints:
    web:
      exposure:
        include: health,info
