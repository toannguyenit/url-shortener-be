server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:urlshortener}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-long-enough}
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info
