# URL Shortener — Application services
# Yêu cầu: infra đã chạy trước (deploy/infra/docker-compose.yml)
# Chạy: docker compose -f app/docker-compose.yml up -d

name: urlshortener-app

services:
  auth-service:
    image: ghcr.io/${GHCR_OWNER}/url-shortener-auth:${IMAGE_TAG:-latest}
    container_name: urlshortener-auth
    restart: unless-stopped
    environment:
      MONGO_HOST: urlshortener-mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-urlshortener}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - urlshortener-net

  url-service:
    image: ghcr.io/${GHCR_OWNER}/url-shortener-url:${IMAGE_TAG:-latest}
    container_name: urlshortener-url
    restart: unless-stopped
    environment:
      MONGO_HOST: urlshortener-mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-urlshortener}
      REDIS_HOST: urlshortener-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      SHORT_URL_BASE: ${SHORT_URL_BASE}
    networks:
      - urlshortener-net
    depends_on:
      - auth-service

  redirect-service:
    image: ghcr.io/${GHCR_OWNER}/url-shortener-redirect:${IMAGE_TAG:-latest}
    container_name: urlshortener-redirect
    restart: unless-stopped
    environment:
      MONGO_HOST: urlshortener-mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-urlshortener}
      REDIS_HOST: urlshortener-redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: urlshortener-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-urlshortener}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-changeme}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-urlshortener}
    networks:
      - urlshortener-net

  analytics-service:
    image: ghcr.io/${GHCR_OWNER}/url-shortener-analytics:${IMAGE_TAG:-latest}
    container_name: urlshortener-analytics
    restart: unless-stopped
    environment:
      MONGO_HOST: urlshortener-mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-urlshortener}
      RABBITMQ_HOST: urlshortener-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-urlshortener}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-changeme}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-urlshortener}
      GEOIP_DB_PATH: /data/GeoLite2-City.mmdb
    volumes:
      - ../data/geoip:/data:ro
    networks:
      - urlshortener-net

  api-gateway:
    image: ghcr.io/${GHCR_OWNER}/url-shortener-gateway:${IMAGE_TAG:-latest}
    container_name: urlshortener-gateway
    restart: unless-stopped
    environment:
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 8081
      URL_SERVICE_HOST: url-service
      URL_SERVICE_PORT: 8082
      ANALYTICS_SERVICE_HOST: analytics-service
      ANALYTICS_SERVICE_PORT: 8084
      REDIS_HOST: urlshortener-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
    networks:
      - urlshortener-net
    depends_on:
      - auth-service
      - url-service
      - analytics-service

  frontend:
    image: ghcr.io/${GHCR_OWNER}/url-shortener-fe:${IMAGE_TAG:-latest}
    container_name: urlshortener-frontend
    restart: unless-stopped
    networks:
      - urlshortener-net
    depends_on:
      - api-gateway

  nginx:
    image: nginx:alpine
    container_name: urlshortener-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certbot/conf:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot:ro
    networks:
      - urlshortener-net
    depends_on:
      - frontend
      - api-gateway
      - redirect-service

  certbot:
    image: certbot/certbot
    container_name: urlshortener-certbot
    volumes:
      - ../certbot/conf:/etc/letsencrypt
      - ../certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - urlshortener-net

networks:
  urlshortener-net:
    external: true
    name: urlshortener-net
