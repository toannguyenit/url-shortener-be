server:
  port: 8082

spring:
  application:
    name: url-service
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:urlshortener}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-long-enough}

app:
  short-url-base: ${SHORT_URL_BASE:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
